name: README-Lint
on:
  pull_request:
    paths:
      - '**.md'
    branches:
      - main
  workflow_call:
    inputs:
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
    secrets:
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications (required if slack_channel_id is set)'
        required: false

permissions:
  contents: read
  pull-requests: write

# markdownlint-cli2 pinned to 0.23.0 (ships smol-toml 1.7.0, clearing the
# GHSA-v3rj-xjv7-4jmq hold that kept us on 0.21.0, plus patched markdown-it /
# linkify-it / js-yaml — Dependabot alerts #1/#3/#4). Keep in sync with package.json.

jobs:
  lint-README:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Get list of changed Markdown files
      id: get-md-files
      run: |
        # CHANGELOG.md is machine-generated by release-please (org-release) and
        # routinely violates blank-line rules (MD012) — lint authored docs only.
        FILES=$(git diff --name-only --diff-filter=d origin/main... | grep '\.md$' | grep -vE '(^|/)CHANGELOG\.md$' || true)
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> $GITHUB_OUTPUT
        else
          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "$FILES" > /tmp/md_files.txt
        fi

    - name: Create markdownlint config
      if: steps.get-md-files.outputs.has_files == 'true'
      run: |
        if [ ! -f .markdownlint-cli2.jsonc ] && [ ! -f .markdownlint-cli2.yaml ] && [ ! -f .markdownlint.jsonc ] && [ ! -f .markdownlint.json ]; then
          cat > .markdownlint-cli2.jsonc <<'JSONC'
        {
          "ignores": ["CHANGELOG.md", "**/CHANGELOG.md"],
          "config": {
            // Policy: enforce well-formed markdown that renders correctly;
            // do NOT enforce cosmetic perfection. Rules that catch real
            // rendering/structural breakage (malformed heading syntax, broken
            // list nesting, spaces inside emphasis/code/links, empty links)
            // stay on via "default": true. Everything below is a deliberate
            // relaxation for authored + machine-generated docs.
            "default": true,
            // -- style pins (single style where consistency matters) --
            "MD029": { "style": "one" },
            "MD035": { "style": "---" },
            "MD046": { "style": "fenced" },
            "MD048": { "style": "backtick" },
            // -- cosmetic rules relaxed: formatted well, not perfect --
            "MD001": false,                    // heading levels may skip; renders fine
            "MD004": false,                    // mixed -/* bullets across generated+authored sections
            "MD007": false,                    // list indent width varies by generator
            "MD009": false,                    // trailing spaces are invisible and harmless
            "MD010": { "code_blocks": false }, // tabs inside code fences are legitimate (Go/Makefile/TF)
            "MD012": false,                    // multiple blank lines (release-please, authored docs)
            "MD013": false,                    // line length
            "MD024": false,                    // duplicate headings (changelogs, per-env sections)
            "MD025": false,                    // multiple H1 (terraform-docs merged READMEs)
            "MD026": false,                    // trailing punctuation in headings
            "MD033": false,                    // inline HTML
            "MD034": false,                    // bare URLs
            "MD036": false,                    // bold-line-as-heading (common authored pattern)
            "MD040": false,                    // fence language tag optional
            "MD041": false,                    // first line need not be a heading
            "MD049": false,                    // _em_ vs *em* style
            "MD050": false,                    // __strong__ vs **strong** style
            "MD051": false,                    // anchor fragments — lychee owns link checking
            "MD060": false
          }
        }
        JSONC
        fi

    - name: Lint Markdown files
      if: steps.get-md-files.outputs.has_files == 'true'
      shell: bash
      run: |
        set -o pipefail
        mapfile -t md_files < /tmp/md_files.txt
        npx --yes markdownlint-cli2@0.23.0 "${md_files[@]}" 2>&1 | tee .github/md_lint_output.txt

    - name: Create Fail Comment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      if: failure()
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const outputPath = '.github/md_lint_output.txt';
          if (!fs.existsSync(outputPath)) return;
          const output = fs.readFileSync(outputPath, 'utf8');
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `#### Markdown Lint Results\n\n\`\`\`\n${output}\n\`\`\``
          });

  notify-failure:
    needs: lint-README
    if: failure() && inputs.slack_channel_id != ''
    uses: ./.github/workflows/org-slack-notify.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
