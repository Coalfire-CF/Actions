name: README-Lint
on:
  pull_request:
    paths:
      - '**.md'
    branches:
      - main
  workflow_call:
    inputs:
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

# markdownlint-cli2 pinned to 0.21.0 (not 0.22.0) due to moderate DoS
# vulnerability in smol-toml dependency (GHSA-v3rj-xjv7-4jmq).
# Upgrade when smol-toml >= 1.6.1 is included upstream.

jobs:
  lint-README:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        fetch-depth: 0

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 22

    - name: Get list of changed Markdown files
      id: get-md-files
      run: |
        FILES=$(git diff --name-only --diff-filter=d origin/main... | grep '\.md$' || true)
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> $GITHUB_OUTPUT
        else
          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "$FILES" > /tmp/md_files.txt
        fi

    - name: Create markdownlint config
      if: steps.get-md-files.outputs.has_files == 'true'
      run: |
        if [ ! -f .markdownlint-cli2.jsonc ] && [ ! -f .markdownlint-cli2.yaml ] && [ ! -f .markdownlint.jsonc ] && [ ! -f .markdownlint.json ]; then
          cat > .markdownlint-cli2.jsonc <<'JSONC'
        {
          "config": {
            "default": true,
            "MD013": false,
            "MD024": false,
            "MD033": false,
            "MD041": false,
            "MD034": false,
            "MD060": false,
            "MD029": { "style": "one" },
            "MD035": { "style": "---" },
            "MD046": { "style": "fenced" },
            "MD048": { "style": "backtick" }
          }
        }
        JSONC
        fi

    - name: Lint Markdown files
      if: steps.get-md-files.outputs.has_files == 'true'
      shell: bash
      run: |
        set -o pipefail
        npx --yes markdownlint-cli2@0.21.0 $(cat /tmp/md_files.txt | tr '\n' ' ') 2>&1 | tee .github/md_lint_output.txt

    - name: Create Fail Comment
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      if: failure()
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const outputPath = '.github/md_lint_output.txt';
          if (!fs.existsSync(outputPath)) return;
          const output = fs.readFileSync(outputPath, 'utf8');
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `#### Markdown Lint Results\n\n\`\`\`\n${output}\n\`\`\``
          });

  notify-failure:
    needs: lint-README
    if: failure() && inputs.slack_channel_id != ''
    uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
