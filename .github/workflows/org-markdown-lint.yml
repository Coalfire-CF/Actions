name: README-Lint
on:
  pull_request:
    paths:
      - '**.md'
    branches:
      - main
  workflow_call:
    inputs:
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pull-requests: write

# markdownlint-cli2 pinned to 0.21.0 (not 0.22.0) due to moderate DoS
# vulnerability in smol-toml dependency (GHSA-v3rj-xjv7-4jmq).
# Upgrade when smol-toml >= 1.6.1 is included upstream.

jobs:
  lint-README:
    name: Lint Markdown files
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

    - name: Setup Node
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22

    - name: Get list of changed Markdown files
      id: get-md-files
      run: |
        FILES=$(git diff --name-only --diff-filter=d origin/main... | grep '\.md$' || true)
        if [ -z "$FILES" ]; then
          echo "has_files=false" >> $GITHUB_OUTPUT
        else
          echo "has_files=true" >> $GITHUB_OUTPUT
          echo "$FILES" > /tmp/md_files.txt
        fi

    - name: Lint Markdown files
      if: steps.get-md-files.outputs.has_files == 'true'
      run: |
        npx --yes markdownlint-cli2@0.21.0 $(cat /tmp/md_files.txt | tr '\n' ' ') 2>&1 | tee .github/md_lint_output.txt

    - name: Create Fail Comment
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
      if: failure()
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const outputPath = '.github/md_lint_output.txt';
          if (!fs.existsSync(outputPath)) return;
          const output = fs.readFileSync(outputPath, 'utf8');
          await github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `#### Markdown Lint Results\n\n\`\`\`\n${output}\n\`\`\``
          });

  notify-failure:
    needs: lint-README
    if: failure() && inputs.slack_channel_id != ''
    uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
