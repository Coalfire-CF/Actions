name: Slack Notification

# Reusable workflow for sending Slack notifications to channels.
# Supports three notification types:
#   - release:      New version released with highlights and changelog link
#   - failure:      Workflow/job failure alert
#   - health-check: Application up/down status
#
# Prerequisites:
#   1. A Slack app with `chat:write` bot scope installed to your workspace
#   2. The bot invited to the target channel (`/invite @BotName`)
#   3. Org-level GitHub secret `SLACK_BOT_TOKEN` with the bot's xoxb- token
#
# Usage — Release notification:
#   jobs:
#     notify:
#       uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
#       secrets: inherit
#       with:
#         notification-type: release
#         channel-id: 'C0123456789'
#         app-name: 'my-repo'
#         release-version: ${{ needs.release.outputs.tag_name }}
#         release-highlights: ${{ needs.release.outputs.release_body }}
#         changelog-url: 'https://github.com/Coalfire-CF/my-repo/blob/main/CHANGELOG.md'
#
# Usage — Failure notification (add as final job in any workflow):
#   jobs:
#     build:
#       runs-on: ubuntu-latest
#       steps: [...]
#
#     notify-failure:
#       needs: build
#       if: failure()
#       uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
#       secrets: inherit
#       with:
#         notification-type: failure
#         channel-id: 'C0123456789'
#         app-name: 'my-repo'
#
# Usage — Health check:
#   jobs:
#     health-check:
#       uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
#       secrets: inherit
#       with:
#         notification-type: health-check
#         channel-id: 'C0123456789'
#         app-name: 'my-app'
#         app-url: 'https://my-app.example.com/health'

on:
  workflow_call:
    inputs:
      notification-type:
        description: 'Type of notification: release, failure, or health-check'
        required: true
        type: string
      channel-id:
        description: 'Slack channel ID to post to (e.g. C0123456789)'
        required: true
        type: string
      app-name:
        description: 'Application or repository display name'
        required: false
        type: string
        default: ${{ github.repository }}
      # Release inputs
      release-version:
        description: 'Release version tag (for release type)'
        required: false
        type: string
      release-highlights:
        description: 'Brief highlights from the release (for release type)'
        required: false
        type: string
      changelog-url:
        description: 'URL to the changelog (for release type)'
        required: false
        type: string
      # Health check inputs
      app-url:
        description: 'URL to health check (for health-check type)'
        required: false
        type: string
    secrets:
      SLACK_BOT_TOKEN:
        required: true

jobs:
  notify:
    name: Send Slack Notification
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        run: |
          if [[ "${{ inputs.notification-type }}" != "release" && \
                "${{ inputs.notification-type }}" != "failure" && \
                "${{ inputs.notification-type }}" != "health-check" ]]; then
            echo "::error::Invalid notification-type: '${{ inputs.notification-type }}'. Must be release, failure, or health-check."
            exit 1
          fi

          if [[ "${{ inputs.notification-type }}" == "release" && -z "${{ inputs.release-version }}" ]]; then
            echo "::error::release-version is required for release notifications."
            exit 1
          fi

          if [[ "${{ inputs.notification-type }}" == "health-check" && -z "${{ inputs.app-url }}" ]]; then
            echo "::error::app-url is required for health-check notifications."
            exit 1
          fi

      - name: Health check
        id: health
        if: inputs.notification-type == 'health-check'
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${{ inputs.app-url }}" || echo "000")
          echo "status=$HTTP_STATUS" >> "$GITHUB_OUTPUT"
          if [[ "$HTTP_STATUS" -ge 200 && "$HTTP_STATUS" -lt 400 ]]; then
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Slack payload
        id: payload
        env:
          NOTIFICATION_TYPE: ${{ inputs.notification-type }}
          APP_NAME: ${{ inputs.app-name }}
          CHANNEL_ID: ${{ inputs.channel-id }}
          RELEASE_VERSION: ${{ inputs.release-version }}
          RELEASE_HIGHLIGHTS: ${{ inputs.release-highlights }}
          CHANGELOG_URL: ${{ inputs.changelog-url }}
          APP_URL: ${{ inputs.app-url }}
          HEALTH_STATUS: ${{ steps.health.outputs.status }}
          HEALTH_HEALTHY: ${{ steps.health.outputs.healthy }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          GITHUB_WORKFLOW_NAME: ${{ github.workflow }}
        run: |
          case "$NOTIFICATION_TYPE" in
            release)
              # Build highlights block if provided
              HIGHLIGHTS_BLOCK=""
              if [[ -n "$RELEASE_HIGHLIGHTS" ]]; then
                # Escape for JSON
                ESCAPED_HIGHLIGHTS=$(echo "$RELEASE_HIGHLIGHTS" | sed 's/"/\\"/g')
                HIGHLIGHTS_BLOCK=$(cat <<BLOCK
                  ,{
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "*Highlights:*\n${ESCAPED_HIGHLIGHTS}"
                    }
                  }
          BLOCK
                )
              fi

              # Build changelog block if provided
              CHANGELOG_BLOCK=""
              if [[ -n "$CHANGELOG_URL" ]]; then
                CHANGELOG_BLOCK=$(cat <<BLOCK
                  ,{
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "<${CHANGELOG_URL}|View Full Changelog>"
                    }
                  }
          BLOCK
                )
              fi

              PAYLOAD=$(cat <<EOF
          {
            "channel": "${CHANNEL_ID}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "New Release: ${APP_NAME}"
                }
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*Version:* \`${RELEASE_VERSION}\`"
                }
              }
              ${HIGHLIGHTS_BLOCK}
              ${CHANGELOG_BLOCK}
            ]
          }
          EOF
              )
              ;;

            failure)
              PAYLOAD=$(cat <<EOF
          {
            "channel": "${CHANNEL_ID}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "Workflow Failed: ${APP_NAME}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Workflow:*\n${GITHUB_WORKFLOW_NAME}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*Repository:*\n${GITHUB_REPOSITORY}"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "<${GITHUB_RUN_URL}|View Failed Run>"
                }
              }
            ]
          }
          EOF
              )
              ;;

            health-check)
              if [[ "$HEALTH_HEALTHY" == "true" ]]; then
                STATUS_EMOJI=":large_green_circle:"
                STATUS_TEXT="UP"
                HEADER_TEXT="${APP_NAME} is UP"
              else
                STATUS_EMOJI=":red_circle:"
                STATUS_TEXT="DOWN"
                HEADER_TEXT="${APP_NAME} is DOWN"
              fi

              PAYLOAD=$(cat <<EOF
          {
            "channel": "${CHANNEL_ID}",
            "blocks": [
              {
                "type": "header",
                "text": {
                  "type": "plain_text",
                  "text": "${HEADER_TEXT}"
                }
              },
              {
                "type": "section",
                "fields": [
                  {
                    "type": "mrkdwn",
                    "text": "*Status:*\n${STATUS_EMOJI} ${STATUS_TEXT}"
                  },
                  {
                    "type": "mrkdwn",
                    "text": "*HTTP Code:*\n\`${HEALTH_STATUS}\`"
                  }
                ]
              },
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*URL:* ${APP_URL}"
                }
              }
            ]
          }
          EOF
              )
              ;;
          esac

          # Write payload to file to avoid shell escaping issues
          echo "$PAYLOAD" > /tmp/slack_payload.json

          # Validate JSON
          if ! jq empty /tmp/slack_payload.json 2>/dev/null; then
            echo "::error::Generated invalid JSON payload"
            cat /tmp/slack_payload.json
            exit 1
          fi

      - name: Send Slack notification
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          RESPONSE=$(curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-Type: application/json" \
            -d @/tmp/slack_payload.json)

          # Check for Slack API errors
          OK=$(echo "$RESPONSE" | jq -r '.ok')
          if [[ "$OK" != "true" ]]; then
            ERROR=$(echo "$RESPONSE" | jq -r '.error')
            echo "::error::Slack API error: ${ERROR}"
            exit 1
          fi

          echo "Slack notification sent successfully."
