name: Release Please

# This is a reusable workflow for downstream repos to call.
# NOTE: This workflow is NOT used for Actions repo releases - see release.yml instead.
#
# !! IMPORTANT — READ BEFORE USING !!
# This workflow REMOVES files from release artifacts by default. When a release is
# created, a cleaned tarball is produced that EXCLUDES directories and files such as
# .github/, docs/, CHANGELOG.md, and release-please configs. Your repository and
# branches are NOT modified — only the release tarball asset is affected. If you do
# not want files stripped from your release artifacts, set clean_release: false.
# See docs/ORG_RELEASE_CLEAN.md for full details.
#
# After release-please creates a release, this workflow runs:
#   1. release-clean  - Produces a cleaned tarball as a release asset (on by default)
#   2. trivy-scan     - Trivy security scan against the full repo
#   3. gitleaks-scan  - Gitleaks secret detection against full repo history
#
# Clean Release:
#   By default, a cleaned tarball (<repo>-<tag>-clean.tar.gz) is uploaded to each
#   GitHub release. It strips non-essential files (.github/, docs/, release configs,
#   etc.) while leaving the repo and branch completely untouched. Each job runs on
#   its own isolated runner — scan jobs always see the full repo.
#
#   The tarball and a SHA256 checksum file are attached as release assets and also
#   available as workflow artifacts (30-day retention).
#
#   .git/ is always removed. Default exclusions:
#     dirs:  .github, docs, .claude
#     files: CHANGELOG.md, release-please-config.json, .release-please-manifest.json,
#            .gitignore, .gitattributes, CLAUDE.md, .claudeignore
#
#   Missing files/dirs in the exclusion lists are skipped gracefully (no failure).
#
# Authentication:
#   This workflow supports an optional GitHub App for authentication. When the
#   org-level secrets below are configured, app tokens are used instead of the
#   default GITHUB_TOKEN — this ensures consistent permissions across public
#   and private repos. If the secrets are not set, the workflow falls back to
#   github.token automatically.
#     - RELEASE_APP_ID:          GitHub App ID (optional)
#     - RELEASE_APP_PRIVATE_KEY: GitHub App private key in PEM format (optional)
#
# Usage in downstream repos (defaults — no config needed):
#   jobs:
#     create-release:
#       uses: Coalfire-CF/Actions/.github/workflows/org-release.yml@v0.2.1
#       secrets: inherit
#
# Custom exclusions:
#   jobs:
#     create-release:
#       uses: Coalfire-CF/Actions/.github/workflows/org-release.yml@v0.2.1
#       secrets: inherit
#       with:
#         clean_exclude_dirs: '.github,docs,.ci,tests'
#         clean_exclude_files: 'CHANGELOG.md,Makefile,release-please-config.json'
#
# Disable clean release:
#   jobs:
#     create-release:
#       uses: Coalfire-CF/Actions/.github/workflows/org-release.yml@v0.2.1
#       secrets: inherit
#       with:
#         clean_release: false

on:
  workflow_call:
    inputs:
      clean_release:
        description: 'Create a cleaned release tarball (excludes non-essential files)'
        required: false
        type: boolean
        default: true
      clean_exclude_dirs:
        description: 'Comma-separated directories to exclude from clean tarball'
        required: false
        type: string
        default: '.github,docs,.claude'
      clean_exclude_files:
        description: 'Comma-separated files to exclude from clean tarball'
        required: false
        type: string
        default: 'CHANGELOG.md,release-please-config.json,.release-please-manifest.json,.gitignore,.gitattributes,CLAUDE.md,.claudeignore'
      slack_channel_id:
        description: 'Slack channel ID for release and failure notifications (optional)'
        required: false
        type: string
        default: ''
    outputs:
      release_created:
        description: Whether a release was created
        value: ${{ jobs.release.outputs.release_created }}
      tag_name:
        description: The tag name of the release
        value: ${{ jobs.release.outputs.tag_name }}
      release_body:
        description: The body of the release (changelog content generated by release-please)
        value: ${{ jobs.release.outputs.release_body }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      release_body: ${{ steps.release.outputs.body }}

    steps:
      - name: Check for GitHub App credentials
        id: check-app
        env:
          APP_ID: ${{ secrets.RELEASE_APP_ID }}
        run: |
          if [[ -n "${APP_ID}" ]]; then
            echo "available=true" >> "${GITHUB_OUTPUT}"
          else
            echo "available=false" >> "${GITHUB_OUTPUT}"
            echo "::notice::GitHub App credentials not found — falling back to github.token"
          fi

      - name: Generate GitHub App token
        id: app-token
        if: steps.check-app.outputs.available == 'true'
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Run Release Please
        id: release
        uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4.4.0
        with:
          token: ${{ steps.app-token.outputs.token || github.token }}

  release-clean:
    name: Clean Release Archive
    needs: release
    if: needs.release.outputs.release_created == 'true' && inputs.clean_release
    uses: Coalfire-CF/Actions/.github/workflows/org-release-clean.yml@main
    permissions:
      contents: write
      actions: read
    with:
      tag_name: ${{ needs.release.outputs.tag_name }}
      exclude_dirs: ${{ inputs.clean_exclude_dirs }}
      exclude_files: ${{ inputs.clean_exclude_files }}
    secrets: inherit

  trivy-scan:
    name: Run Trivy Security Scan
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: Coalfire-CF/Actions/.github/workflows/org-trivy-release.yml@main
    permissions:
      contents: write
      actions: read

  gitleaks-scan:
    name: Run Gitleaks Secret Scan
    needs: release
    if: needs.release.outputs.release_created == 'true'
    uses: Coalfire-CF/Actions/.github/workflows/org-gitleaks-release.yml@main
    permissions:
      contents: write
      actions: read

  notify-release:
    name: Slack Release Notification
    needs: release
    if: needs.release.outputs.release_created == 'true' && inputs.slack_channel_id != ''
    uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: release
      channel-id: ${{ inputs.slack_channel_id }}
      release-version: ${{ needs.release.outputs.tag_name }}
      release-highlights: ${{ needs.release.outputs.release_body }}
      changelog-url: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md

  notify-failure:
    name: Slack Failure Notification
    needs: [release, release-clean, trivy-scan, gitleaks-scan]
    if: failure() && inputs.slack_channel_id != ''
    uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
