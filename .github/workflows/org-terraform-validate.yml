name: Terraform Validate

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
    secrets:
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications (required if slack_channel_id is set)'
        required: false
      TF_VALIDATE_APP_CLIENT_ID:
        description: 'The GitHub App client ID for Terraform authentication (only needed for private repositories)'
        required: false
      TF_VALIDATE_APP_PRIVATE_KEY:
        description: 'The GitHub App private key for Terraform authentication (only needed for private repositories)'
        required: false

  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string

permissions:
  contents: read
  pull-requests: write

jobs:
  verify:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - name: Resolve Terraform version
      id: tf-version
      env:
        INPUT_TF_VERSION: ${{ inputs.terraform_version }}
        # F36 (Plan B): baked hermetic default — see org-terraform-plan.yml.
        # github.job_workflow_sha is empty cross-repo; this literal is bumped
        # by org-terraform-version-check alongside .terraform-version.
        DEFAULT_TF_VERSION: '1.15.7'
      run: |
        if [ -n "$INPUT_TF_VERSION" ]; then
          VERSION="$INPUT_TF_VERSION"
        elif [ -f .terraform-version ]; then
          VERSION="$(tr -d '[:space:]' < .terraform-version)"
        else
          VERSION="${DEFAULT_TF_VERSION}"
        fi
        # Fail-closed (F36): an empty/malformed .terraform-version or a
        # pre-release input must NOT fall through to setup-terraform's "latest".
        if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Could not resolve a concrete X.Y.Z Terraform version (got '${VERSION}')"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
      with:
        terraform_version: ${{ steps.tf-version.outputs.version }}

    - name: Check for secrets
      id: check-secrets
      run: |
        if [ -n "$TF_VALIDATE_APP_CLIENT_ID" ] && [ -n "$TF_VALIDATE_APP_PRIVATE_KEY" ]; then
          echo "has_secrets=true" >> $GITHUB_OUTPUT
        else
          echo "has_secrets=false" >> $GITHUB_OUTPUT
        fi
      env:
        TF_VALIDATE_APP_CLIENT_ID: ${{ secrets.TF_VALIDATE_APP_CLIENT_ID }}
        TF_VALIDATE_APP_PRIVATE_KEY: ${{ secrets.TF_VALIDATE_APP_PRIVATE_KEY }}
        
    - name: Get Checkout Token
      id: checkout-token
      if: steps.check-secrets.outputs.has_secrets == 'true'
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        app-id: ${{ secrets.TF_VALIDATE_APP_CLIENT_ID }}
        private-key: ${{ secrets.TF_VALIDATE_APP_PRIVATE_KEY }}
        owner: ${{ github.repository_owner }}
    
    - name: Configure Git
      if: steps.check-secrets.outputs.has_secrets == 'true'
      env:
        APP_TOKEN: ${{ steps.checkout-token.outputs.token }}
      run: |
        git config --global url."https://actions:${APP_TOKEN}@github.com".insteadOf https://github.com
        git config --global url."https://actions:${APP_TOKEN}@github.com/".insteadOf ssh://git@github.com/
        
    - name: Initialise with no backend
      run: terraform init -backend=false

    - name: Validate Terraform
      id: validate
      run: |
        set +e
        OUTPUT=$(terraform validate)
        CLEAN_OUTPUT=$(echo "$OUTPUT" | sed -r "s/\x1B\[([0-9]{1,2}(;[0-9]{1,2})?)?[m|K]//g")
        echo "$CLEAN_OUTPUT"
        echo "$CLEAN_OUTPUT" > "$GITHUB_WORKSPACE/validate_output.txt"
        set -e
      continue-on-error: true

    - name: Create comment
      if: github.event_name == 'pull_request'
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const issue_number = context.issue.number;
          const result = fs.readFileSync(process.env.GITHUB_WORKSPACE + '/validate_output.txt', 'utf8');
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: issue_number,
            body: `Terraform validation output:\n\`\`\`\n${result}\n\`\`\``
          });
  notify-failure:
    needs: verify
    if: failure() && inputs.slack_channel_id != ''
    uses: ./.github/workflows/org-slack-notify.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
