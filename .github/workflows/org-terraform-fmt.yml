name: Terraform fmt

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
    secrets:
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications (required if slack_channel_id is set)'
        required: false

  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string
  pull_request:

jobs:
  verify:
    name: Check Terraform Formatting
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      with:
        ref: ${{ github.head_ref }}  # Checkout the PR source branch

    - name: Resolve Terraform version
      id: tf-version
      env:
        INPUT_TF_VERSION: ${{ inputs.terraform_version }}
        # F36 (Plan B): baked hermetic default — see org-terraform-plan.yml.
        # github.job_workflow_sha is empty cross-repo; this literal is bumped
        # by org-terraform-version-check alongside .terraform-version.
        DEFAULT_TF_VERSION: '1.15.7'
      run: |
        if [ -n "$INPUT_TF_VERSION" ]; then
          VERSION="$INPUT_TF_VERSION"
        elif [ -f .terraform-version ]; then
          VERSION="$(tr -d '[:space:]' < .terraform-version)"
        else
          VERSION="${DEFAULT_TF_VERSION}"
        fi
        # Fail-closed (F36): an empty/malformed .terraform-version or a
        # pre-release input must NOT fall through to setup-terraform's "latest".
        if ! echo "$VERSION" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "::error::Could not resolve a concrete X.Y.Z Terraform version (got '${VERSION}')"
          exit 1
        fi
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4
      with:
        terraform_version: ${{ steps.tf-version.outputs.version }}

    - name: Run Terraform fmt
      run: terraform fmt -recursive

    - name: Commit changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git diff --quiet && git diff --staged --quiet || (git add -A && git commit -m "Apply terraform fmt")

    - name: Post comment on failure
      if: failure()
      uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: "Terraform fmt failed. We recommend setting up your IDE to automatically run terraform fmt on save or before pushing."
          });

  notify-failure:
    needs: verify
    if: failure() && inputs.slack_channel_id != ''
    uses: ./.github/workflows/org-slack-notify.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
