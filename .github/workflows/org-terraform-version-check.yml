name: Terraform Version Check

on:
  schedule:
    - cron: '0 9 1,15 * *' # 1st and 15th of each month at 9am UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-version:
    name: Check for New Terraform Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Get current version
        id: current
        run: |
          CURRENT=$(cat .terraform-version | tr -d '[:space:]')
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Get latest stable Terraform release
        id: latest
        run: |
          LATEST=$(curl -s https://api.github.com/repos/hashicorp/terraform/releases/latest | jq -r '.tag_name' | sed 's/^v//')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "::error::Failed to fetch latest Terraform release"
            exit 1
          fi
          echo "version=$LATEST" >> $GITHUB_OUTPUT

      - name: Compare versions
        id: compare
        run: |
          if [ "${{ steps.current.outputs.version }}" = "${{ steps.latest.outputs.version }}" ]; then
            echo "needs_update=false" >> $GITHUB_OUTPUT
            echo "Already on latest version: ${{ steps.current.outputs.version }}"
          else
            echo "needs_update=true" >> $GITHUB_OUTPUT
            echo "Update available: ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          fi

      - name: Check for existing PR
        if: steps.compare.outputs.needs_update == 'true'
        id: existing-pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "chore/terraform-${{ steps.latest.outputs.version }}" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "PR #$EXISTING already exists for this version"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create version bump branch
        if: steps.compare.outputs.needs_update == 'true' && steps.existing-pr.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "chore/terraform-${{ steps.latest.outputs.version }}"
          echo "${{ steps.latest.outputs.version }}" > .terraform-version
          git add .terraform-version
          git commit -m "chore: bump terraform version to ${{ steps.latest.outputs.version }}"
          git push origin "chore/terraform-${{ steps.latest.outputs.version }}"

      - name: Create Pull Request
        if: steps.compare.outputs.needs_update == 'true' && steps.existing-pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "chore: bump terraform version to ${{ steps.latest.outputs.version }}" \
            --body "$(cat <<'EOF'
          ## Summary

          - Bumps default Terraform version from `${{ steps.current.outputs.version }}` to `${{ steps.latest.outputs.version }}`
          - Release notes: https://github.com/hashicorp/terraform/releases/tag/v${{ steps.latest.outputs.version }}

          ## Review Checklist

          - [ ] Review the [Terraform changelog](https://github.com/hashicorp/terraform/releases/tag/v${{ steps.latest.outputs.version }}) for breaking changes
          - [ ] Verify compatibility with existing modules and state files
          - [ ] Confirm provider compatibility with new version

          🤖 Auto-generated by Terraform Version Check workflow
          EOF
          )" \
            --base main
