name: Terraform Apply

on:
  workflow_call:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string
      working_directory:
        description: 'Working directory for Terraform commands'
        required: false
        default: '.'
        type: string
      backend_config:
        description: 'Backend configuration arguments (e.g., -backend-config=bucket=my-bucket)'
        required: false
        default: ''
        type: string
      var_file:
        description: 'Path to a Terraform variables file'
        required: false
        default: ''
        type: string
      destroy_after_apply:
        description: 'Run terraform destroy after apply (for terratest / ephemeral environments)'
        required: false
        default: false
        type: boolean
      environment:
        description: 'GitHub environment for deployment protection rules (leave empty for no environment gate)'
        required: false
        default: ''
        type: string
      aws_region:
        description: 'AWS region for OIDC authentication'
        required: false
        default: 'us-east-1'
        type: string
      aws_role_arn:
        description: 'AWS IAM role ARN for OIDC authentication (leave empty to skip AWS auth)'
        required: false
        default: ''
        type: string
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        default: ''
        type: string
    secrets:
      TF_APPLY_APP_CLIENT_ID:
        description: 'GitHub App client ID for private module access'
        required: false
      TF_APPLY_APP_PRIVATE_KEY:
        description: 'GitHub App private key for private module access'
        required: false

  workflow_dispatch:
    inputs:
      terraform_version:
        description: 'The version of Terraform to use (leave empty to use .terraform-version)'
        required: false
        default: ''
        type: string
      working_directory:
        description: 'Working directory for Terraform commands'
        required: false
        default: '.'
        type: string
      destroy_after_apply:
        description: 'Run terraform destroy after apply'
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    defaults:
      run:
        working-directory: ${{ inputs.working_directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Resolve Terraform version
        id: tf-version
        working-directory: .
        env:
          INPUT_TF_VERSION: ${{ inputs.terraform_version }}
        run: |
          if [ -n "$INPUT_TF_VERSION" ]; then
            echo "version=$INPUT_TF_VERSION" >> $GITHUB_OUTPUT
          elif [ -f .terraform-version ]; then
            echo "version=$(cat .terraform-version | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -s https://raw.githubusercontent.com/Coalfire-CF/Actions/main/.terraform-version | tr -d '[:space:]')
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ steps.tf-version.outputs.version }}
          terraform_wrapper: false

      - name: Check for GitHub App secrets
        id: check-app-secrets
        run: |
          if [ -n "$TF_APPLY_APP_CLIENT_ID" ] && [ -n "$TF_APPLY_APP_PRIVATE_KEY" ]; then
            echo "has_secrets=true" >> $GITHUB_OUTPUT
          else
            echo "has_secrets=false" >> $GITHUB_OUTPUT
          fi
        env:
          TF_APPLY_APP_CLIENT_ID: ${{ secrets.TF_APPLY_APP_CLIENT_ID }}
          TF_APPLY_APP_PRIVATE_KEY: ${{ secrets.TF_APPLY_APP_PRIVATE_KEY }}

      - name: Get GitHub App Token
        id: app-token
        if: steps.check-app-secrets.outputs.has_secrets == 'true'
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        with:
          app-id: ${{ secrets.TF_APPLY_APP_CLIENT_ID }}
          private-key: ${{ secrets.TF_APPLY_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Configure Git for private modules
        if: steps.check-app-secrets.outputs.has_secrets == 'true'
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global url."https://actions:${APP_TOKEN}@github.com".insteadOf https://github.com
          git config --global url."https://actions:${APP_TOKEN}@github.com/".insteadOf ssh://git@github.com/

      - name: Configure AWS credentials (OIDC)
        if: inputs.aws_role_arn != ''
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ inputs.aws_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Terraform Init
        env:
          INPUT_BACKEND_CONFIG: ${{ inputs.backend_config }}
        run: |
          INIT_ARGS=""
          if [ -n "$INPUT_BACKEND_CONFIG" ]; then
            INIT_ARGS="-backend-config=$INPUT_BACKEND_CONFIG"
          fi
          terraform init $INIT_ARGS

      - name: Terraform Plan
        env:
          INPUT_VAR_FILE: ${{ inputs.var_file }}
        run: |
          PLAN_ARGS="-no-color -input=false -out=tfplan"
          if [ -n "$INPUT_VAR_FILE" ]; then
            PLAN_ARGS="$PLAN_ARGS -var-file=$INPUT_VAR_FILE"
          fi
          terraform plan $PLAN_ARGS

      - name: Upload plan artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: tfplan-apply-${{ github.run_id }}
          path: ${{ inputs.working_directory }}/tfplan
          retention-days: 5

      - name: Terraform Apply
        run: terraform apply -no-color -input=false tfplan

      - name: Terraform Destroy
        if: inputs.destroy_after_apply && always()
        env:
          INPUT_VAR_FILE: ${{ inputs.var_file }}
        run: |
          DESTROY_ARGS="-no-color -input=false -auto-approve"
          if [ -n "$INPUT_VAR_FILE" ]; then
            DESTROY_ARGS="$DESTROY_ARGS -var-file=$INPUT_VAR_FILE"
          fi
          terraform destroy $DESTROY_ARGS

  notify-failure:
    needs: apply
    if: failure() && inputs.slack_channel_id != ''
    uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
