name: Dependabot Auto-Merge

# Reusable workflow that evaluates Dependabot PRs for auto-merge eligibility.
# It classifies the dependency, runs supply chain and breaking change checks,
# and either approves + auto-merges or labels the PR for human review.
#
# Terraform module and provider bumps are always skipped (labeled for manual
# review) until unit testing infrastructure is in place.
#
# Check results are recorded as labels for audit trail and dashboard visibility.
# Cross-repo analysis caching via S3 prevents redundant API calls when the same
# dependency+version is bumped across multiple repos.
#
# Prerequisites:
#   1. Run org-label-sync.yml to ensure required labels exist in the repo
#   2. Create a dedicated GitHub App with pull-request write + read permissions
#   3. Create an OIDC role with S3 cache + Bedrock Converse access (see docs)
#
# Usage in downstream repos:
#   name: Dependabot Auto-Merge
#   on:
#     pull_request_target:
#       types: [opened, synchronize, reopened]
#
#   jobs:
#     auto-merge:
#       if: github.event.pull_request.user.login == 'dependabot[bot]'
#       uses: Coalfire-CF/Actions/.github/workflows/org-dependabot-auto-merge.yml@main
#       secrets: inherit
#
# IMPORTANT: Use pull_request_target (not pull_request) so the workflow has
# write permissions on Dependabot PRs. The workflow only checks out metadata,
# never executes code from the PR branch.
#
# Decision logic (grade-A plan #10): the supply-chain, breaking-change, and
# decide steps run committed, unit-tested, shellcheck-clean scripts under
# scripts/*.sh instead of inline heredocs. Because this is a reusable workflow
# that runs in the CONSUMER's checkout, each of those jobs self-checks-out
# Coalfire-CF/Actions into ./actions-tools at `inputs.actions_ref` (default
# 'main') and invokes actions-tools/scripts/<name>.sh. This is the same central
# model the gate workflows (org-opa, org-terraform-source-pin,
# org-terraform-version-band) already use for scripts/ and gate-config.yml:
# pinning THIS workflow by SHA does not by itself pin the decision scripts —
# they resolve at actions_ref. Consumers who want the logic pinned to the same
# immutable ref pass `actions_ref: <release-sha>  # vX.Y.Z` (see docs).

on:
  workflow_call:
    inputs:
      aws_region:
        description: 'AWS region for OIDC, S3 cache, and Bedrock'
        required: false
        type: string
        default: 'us-east-1'
      s3_cache_bucket:
        description: 'S3 bucket name for cross-repo analysis cache'
        required: false
        type: string
        default: 'coalfire-dependabot-cache'
      scorecard_threshold:
        description: 'Minimum OpenSSF Scorecard score (0-10) to pass'
        required: false
        type: number
        default: 5
      first_party_prefix:
        description: >-
          Dependency-name prefix treated as first-party (trusted org refs).
          The Scorecard gate is waived for matches — the Scorecard API has no
          data for private/small org repos, which would otherwise hard-block
          every first-party bump (RFC-0010 practice 3: same-major first-party
          bumps auto-merge on green CI).
        required: false
        type: string
        default: 'Coalfire-CF/'
      auto_merge_method:
        description: 'Merge method: merge, squash, or rebase'
        required: false
        type: string
        default: 'squash'
      bedrock_model_id:
        description: 'Bedrock model ID for changelog analysis'
        required: false
        type: string
        default: 'us.anthropic.claude-haiku-4-5-20251001-v1:0'
      cache_ttl_days:
        description: 'Number of days before cached analysis expires'
        required: false
        type: number
        default: 30
      jitter_max_seconds:
        description: >-
          Max seconds for a random pre-call delay before the first external API
          call in each check job (grade-A #13). De-syncs the fleet-wide daily
          Dependabot burst so OSV/Scorecard/Bedrock/GitHub see a spread-out load.
          0 disables.
        required: false
        type: number
        default: 30
      actions_ref:
        description: >-
          Git ref of Coalfire-CF/Actions to load the extracted decision scripts
          (scripts/supply-chain-check.sh, breaking-change-check.sh,
          auto-merge-decide.sh) from. Defaults to 'main' — the same central
          model the gate workflows (org-opa, org-terraform-source-pin,
          org-terraform-version-band) already use for scripts/ and
          gate-config.yml. Pin to a release SHA (e.g.
          "d34db33f...  # v0.10.1") to freeze the decision logic to the same
          immutable ref you pin this reusable workflow to.
        required: false
        type: string
        default: 'main'
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
    secrets:
      AUTOMERGE_DEPENDABOT_ROLE_ARN:
        description: 'IAM role ARN for OIDC assumption (S3 cache + Bedrock)'
        required: true
      AUTOMERGE_CLIENT_ID:
        description: 'GitHub App client ID for PR approval and auto-merge'
        required: true
      AUTOMERGE_APP_PRIVATE_KEY:
        description: 'GitHub App private key (PEM) for PR approval and auto-merge'
        required: true
      SLACK_BOT_TOKEN:
        required: false

# One auto-merge evaluation per PR at a time; never cancel a merge mid-flight.
concurrency:
  group: dependabot-auto-merge-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  # ----------------------------------------------------------------
  # Job 1: Classify the dependency and determine auto-merge eligibility
  # ----------------------------------------------------------------
  classify:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    outputs:
      ecosystem: ${{ steps.metadata.outputs.package-ecosystem }}
      dep_name: ${{ steps.parse.outputs.dep_name }}
      from_version: ${{ steps.parse.outputs.from_version }}
      to_version: ${{ steps.parse.outputs.to_version }}
      update_type: ${{ steps.metadata.outputs.update-type }}
      dependency_group: ${{ steps.metadata.outputs.dependency-group }}
      deps_b64: ${{ steps.parse.outputs.deps_b64 }}
      parse_error: ${{ steps.parse.outputs.parse_error }}
      is_eligible: ${{ steps.decide-eligibility.outputs.is_eligible }}
      dep_label: ${{ steps.decide-eligibility.outputs.dep_label }}
      is_first_party: ${{ steps.decide-eligibility.outputs.is_first_party }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ github.token }}

      - name: Parse dependency details
        id: parse
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          META_DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          META_PREV_VER: ${{ steps.metadata.outputs.previous-version }}
          META_NEW_VER: ${{ steps.metadata.outputs.new-version }}
          META_DEPS_JSON: ${{ steps.metadata.outputs.updated-dependencies-json }}
        run: |
          set -euo pipefail
          echo "dep_name=${META_DEP_NAMES}" >> "$GITHUB_OUTPUT"
          echo "from_version=${META_PREV_VER}" >> "$GITHUB_OUTPUT"
          echo "to_version=${META_NEW_VER}" >> "$GITHUB_OUTPUT"

          # Build the authoritative per-dependency list (grouped-PR support).
          # previous/new-version above are FIRST-dependency-only on grouped
          # PRs; updated-dependencies-json carries every member. Any parse
          # ambiguity fails CLOSED via parse_error -> decide routes the PR
          # to manual review instead of evaluating a partial view.
          PARSE_ERROR="false"
          DEPS_TSV=""
          if [ -n "${META_DEPS_JSON:-}" ] && echo "$META_DEPS_JSON" | jq -e 'type=="array" and length>0' >/dev/null 2>&1; then
            # Empty fields become "-" placeholders: tab is IFS whitespace, so a
            # truly empty middle field would silently shift read's columns.
            DEPS_TSV=$(echo "$META_DEPS_JSON" | jq -r '.[] | [((.dependencyName // "") | if .=="" then "-" else . end), ((.prevVersion // "") | if .=="" then "-" else . end), ((.newVersion // "") | if .=="" then "-" else . end)] | @tsv')
            if echo "$DEPS_TSV" | awk -F'\t' '$1=="-" || $3=="-"{bad=1} END{exit bad?0:1}'; then
              echo "::warning::updated-dependencies-json rows missing name/newVersion — failing closed"
              PARSE_ERROR="true"
            fi
          elif [ -n "${META_DEP_NAMES}" ] && [ "${META_DEP_NAMES}" = "${META_DEP_NAMES%%,*}" ]; then
            # Single dependency, no JSON — classic scalar fallback
            DEPS_TSV=$(printf '%s\t%s\t%s' "$META_DEP_NAMES" "${META_PREV_VER:--}" "${META_NEW_VER:--}")
          else
            echo "::warning::multiple dependency names but no parseable updated-dependencies-json — failing closed"
            PARSE_ERROR="true"
          fi
          echo "deps_b64=$(printf '%s' "$DEPS_TSV" | base64 -w0)" >> "$GITHUB_OUTPUT"
          echo "parse_error=${PARSE_ERROR}" >> "$GITHUB_OUTPUT"

      - name: Determine eligibility and ecosystem label
        id: decide-eligibility
        env:
          ECOSYSTEM: ${{ steps.metadata.outputs.package-ecosystem }}
          DEP_NAMES: ${{ steps.metadata.outputs.dependency-names }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          FIRST_PARTY_PREFIX: ${{ inputs.first_party_prefix }}
        run: |
          set -euo pipefail

          IS_ELIGIBLE="true"
          DEP_LABEL="dep/other"

          # First-party detection: every dependency in the PR must match the
          # trusted prefix (grouped updates mixing first- and third-party stay
          # third-party so all gates apply).
          IS_FIRST_PARTY="false"
          if [ -n "$FIRST_PARTY_PREFIX" ] && [ -n "$DEP_NAMES" ]; then
            IS_FIRST_PARTY="true"
            IFS=',' read -ra NAME_ARR <<< "$DEP_NAMES"
            for name in "${NAME_ARR[@]}"; do
              name="$(echo "$name" | xargs)"
              case "$name" in
                "$FIRST_PARTY_PREFIX"*) ;;
                *) IS_FIRST_PARTY="false"; break ;;
              esac
            done
          fi

          case "$ECOSYSTEM" in
            github-actions|github_actions) DEP_LABEL="dep/github-actions" ;;
            docker)            DEP_LABEL="dep/docker" ;;
            pip)               DEP_LABEL="dep/pip" ;;
            npm)               DEP_LABEL="dep/npm" ;;
            gomod)             DEP_LABEL="dep/gomod" ;;
            nuget)             DEP_LABEL="dep/nuget" ;;
            cargo)             DEP_LABEL="dep/cargo" ;;
            bundler)           DEP_LABEL="dep/bundler" ;;
            composer)          DEP_LABEL="dep/composer" ;;
            terraform)
              # Determine if this is a provider or module update.
              # Providers typically match: hashicorp/* or registry paths.
              # Module refs match: org/reponame patterns in source blocks.
              if echo "$DEP_NAMES" | grep -qiE 'hashicorp/|terraform-provider-|registry\.terraform\.io'; then
                DEP_LABEL="dep/terraform-provider"
              else
                DEP_LABEL="dep/terraform-module"
              fi
              IS_ELIGIBLE="false"
              ;;
            *)
              DEP_LABEL="dep/other"
              ;;
          esac

          echo "is_eligible=${IS_ELIGIBLE}" >> "$GITHUB_OUTPUT"
          echo "dep_label=${DEP_LABEL}" >> "$GITHUB_OUTPUT"
          echo "is_first_party=${IS_FIRST_PARTY}" >> "$GITHUB_OUTPUT"

      - name: Apply ecosystem label
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEP_LABEL: ${{ steps.decide-eligibility.outputs.dep_label }}
          IS_ELIGIBLE: ${{ steps.decide-eligibility.outputs.is_eligible }}
        with:
          script: |
            const depLabel = process.env.DEP_LABEL;
            const isEligible = process.env.IS_ELIGIBLE === 'true';
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Apply ecosystem label
            const labelsToAdd = [depLabel];

            if (isEligible) {
              labelsToAdd.push('merge/eligible');
            } else {
              labelsToAdd.push('merge/skipped', 'blocked/terraform-no-tests');
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels: labelsToAdd,
            });

            if (!isEligible) {
              core.info(`Terraform dependency detected — skipping auto-merge pipeline`);
            }

  # ----------------------------------------------------------------
  # Job 2: Supply chain checks (OSV.dev + OpenSSF Scorecard)
  # ----------------------------------------------------------------
  supply_chain_check:
    needs: classify
    if: needs.classify.outputs.is_eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    outputs:
      osv_clear: ${{ steps.checks.outputs.osv_clear }}
      scorecard_pass: ${{ steps.checks.outputs.scorecard_pass }}
      scorecard_score: ${{ steps.checks.outputs.scorecard_score }}
      cache_hit: ${{ steps.checks.outputs.cache_hit }}
      check_errors: ${{ steps.checks.outputs.check_errors }}
    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AUTOMERGE_DEPENDABOT_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Checkout Actions repo (decision scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Coalfire-CF/Actions
          ref: ${{ inputs.actions_ref || 'main' }}
          path: actions-tools

      - name: Run supply chain checks
        id: checks
        env:
          DEP_NAME: ${{ needs.classify.outputs.dep_name }}
          TO_VERSION: ${{ needs.classify.outputs.to_version }}
          ECOSYSTEM: ${{ needs.classify.outputs.ecosystem }}
          DEPS_B64: ${{ needs.classify.outputs.deps_b64 }}
          PARSE_ERROR: ${{ needs.classify.outputs.parse_error }}
          S3_BUCKET: ${{ inputs.s3_cache_bucket }}
          CACHE_TTL_DAYS: ${{ inputs.cache_ttl_days }}
          SCORECARD_THRESHOLD: ${{ inputs.scorecard_threshold }}
          JITTER_MAX_SECONDS: ${{ inputs.jitter_max_seconds }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/actions-tools/scripts/supply-chain-check.sh"

      - name: Apply supply chain labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          OSV_CLEAR: ${{ steps.checks.outputs.osv_clear }}
          SCORECARD_PASS: ${{ steps.checks.outputs.scorecard_pass }}
          CACHE_HIT: ${{ steps.checks.outputs.cache_hit }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = [];

            labels.push(process.env.OSV_CLEAR === 'true' ? 'check/osv-clear' : 'check/osv-vuln');
            labels.push(process.env.SCORECARD_PASS === 'true' ? 'check/scorecard-pass' : 'check/scorecard-low');
            if (process.env.CACHE_HIT === 'true') labels.push('check/cached');

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels,
            });

  # ----------------------------------------------------------------
  # Job 3: Breaking change detection (semver + AI changelog analysis)
  # Runs in parallel with supply_chain_check
  # ----------------------------------------------------------------
  breaking_change_check:
    needs: classify
    if: needs.classify.outputs.is_eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    outputs:
      semver_type: ${{ steps.checks.outputs.semver_type }}
      has_breaking_changes: ${{ steps.checks.outputs.has_breaking_changes }}
      ai_breaking: ${{ steps.checks.outputs.ai_breaking }}
      confidence: ${{ steps.checks.outputs.confidence }}
      risk_summary: ${{ steps.checks.outputs.risk_summary }}
      applies_to_repo: ${{ steps.checks.outputs.applies_to_repo }}
      check_errors: ${{ steps.checks.outputs.check_errors }}
    steps:
      - name: Checkout default branch (for usage analysis)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Gather dependency usage context
        id: usage
        env:
          ECOSYSTEM: ${{ needs.classify.outputs.ecosystem }}
          DEPS_B64: ${{ needs.classify.outputs.deps_b64 }}
        run: |
          set -euo pipefail
          # One usage-context file PER dependency (grouped-PR support):
          # /tmp/dep_usage_<name-with-slashes-as-dashes>.txt
          printf '%s' "${DEPS_B64:-}" | base64 -d > /tmp/deps.tsv 2>/dev/null || : > /tmp/deps.tsv
          while IFS=$'\t' read -r -u3 DEP_NAME _FROM _TO || [ -n "${DEP_NAME:-}" ]; do
            [ -n "$DEP_NAME" ] && [ "$DEP_NAME" != "-" ] || { DEP_NAME=""; continue; }
            USAGE=""
            case "$ECOSYSTEM" in
              github-actions|github_actions)
                # Extract the full step (uses + with/env/script blocks) for
                # context so the model sees parameters, not just the uses: line.
                for wf in .github/workflows/*.yml .github/workflows/*.yaml; do
                  [ -f "$wf" ] || continue
                  if grep -q "$DEP_NAME" "$wf" 2>/dev/null; then
                    STEP_CONTEXT=$(grep -n -A 50 "$DEP_NAME" "$wf" 2>/dev/null | head -80)
                    USAGE="${USAGE}--- ${wf} ---\n${STEP_CONTEXT}\n\n"
                  fi
                done
                USAGE=$(echo -e "$USAGE")
                [ -z "$USAGE" ] && USAGE="No usage found"
                ;;
              npm)
                USAGE=$(grep -rn --include='*.js' --include='*.ts' --include='*.mjs' --include='*.cjs' -E "(require|import).*['\"]${DEP_NAME}['\"]" . 2>/dev/null | head -30 || echo "No usage found")
                ;;
              pip)
                USAGE=$(grep -rn --include='*.py' -E "(import|from) ${DEP_NAME}" . 2>/dev/null | head -30 || echo "No usage found")
                ;;
              gomod)
                USAGE=$(grep -rn --include='*.go' "${DEP_NAME}" . 2>/dev/null | head -30 || echo "No usage found")
                ;;
              *)
                USAGE="Usage analysis not supported for ecosystem: ${ECOSYSTEM}"
                ;;
            esac
            USAGE=$(echo "$USAGE" | head -c 3000)
            echo "$USAGE" > "/tmp/dep_usage_$(echo "$DEP_NAME" | sed 's|/|--|g').txt"
            DEP_NAME=""
          done 3< /tmp/deps.tsv

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AUTOMERGE_DEPENDABOT_ROLE_ARN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Checkout Actions repo (decision scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Coalfire-CF/Actions
          ref: ${{ inputs.actions_ref || 'main' }}
          path: actions-tools

      - name: Run breaking change checks
        id: checks
        env:
          DEP_NAME: ${{ needs.classify.outputs.dep_name }}
          FROM_VERSION: ${{ needs.classify.outputs.from_version }}
          TO_VERSION: ${{ needs.classify.outputs.to_version }}
          ECOSYSTEM: ${{ needs.classify.outputs.ecosystem }}
          DEPS_B64: ${{ needs.classify.outputs.deps_b64 }}
          PARSE_ERROR: ${{ needs.classify.outputs.parse_error }}
          S3_BUCKET: ${{ inputs.s3_cache_bucket }}
          CACHE_TTL_DAYS: ${{ inputs.cache_ttl_days }}
          BEDROCK_MODEL_ID: ${{ inputs.bedrock_model_id }}
          GH_TOKEN: ${{ github.token }}
          JITTER_MAX_SECONDS: ${{ inputs.jitter_max_seconds }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/actions-tools/scripts/breaking-change-check.sh"

      - name: Apply breaking change labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          SEMVER_TYPE: ${{ steps.checks.outputs.semver_type }}
          HAS_BREAKING: ${{ steps.checks.outputs.has_breaking_changes }}
          AI_BREAKING: ${{ steps.checks.outputs.ai_breaking }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labels = [];

            const semverType = process.env.SEMVER_TYPE;
            if (semverType === 'major') labels.push('check/semver-major');
            else if (semverType === 'minor') labels.push('check/semver-minor');
            else labels.push('check/semver-patch');

            const hasBreaking = process.env.HAS_BREAKING === 'true';
            if (hasBreaking) {
              labels.push('check/changelog-breaking');
            } else {
              labels.push('check/changelog-safe');
            }

            // Additive AUDIT label (grade-A #12): reflects the RAW model verdict
            // (pre major-override), so it stays meaningful on major bumps where the
            // deterministic override forces has_breaking_changes=true regardless of
            // the model. It does NOT gate — the decide job still enforces
            // has_breaking_changes; this label is model-drift visibility only.
            if (process.env.AI_BREAKING === 'true') {
              labels.push('ai/breaking-suspected');
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels,
            });

  # ----------------------------------------------------------------
  # Job 4: Decision — approve + auto-merge or block with reason
  # ----------------------------------------------------------------
  decide:
    needs: [classify, supply_chain_check, breaking_change_check]
    if: needs.classify.outputs.is_eligible == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.AUTOMERGE_CLIENT_ID }}
          private-key: ${{ secrets.AUTOMERGE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout Actions repo (decision scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Coalfire-CF/Actions
          ref: ${{ inputs.actions_ref || 'main' }}
          path: actions-tools

      - name: Evaluate checks and decide
        id: decision
        env:
          OSV_CLEAR: ${{ needs.supply_chain_check.outputs.osv_clear }}
          SCORECARD_PASS: ${{ needs.supply_chain_check.outputs.scorecard_pass }}
          SCORECARD_SCORE: ${{ needs.supply_chain_check.outputs.scorecard_score }}
          SEMVER_TYPE: ${{ needs.breaking_change_check.outputs.semver_type }}
          HAS_BREAKING: ${{ needs.breaking_change_check.outputs.has_breaking_changes }}
          CONFIDENCE: ${{ needs.breaking_change_check.outputs.confidence }}
          RISK_SUMMARY: ${{ needs.breaking_change_check.outputs.risk_summary }}
          APPLIES_TO_REPO: ${{ needs.breaking_change_check.outputs.applies_to_repo }}
          DEP_NAME: ${{ needs.classify.outputs.dep_name }}
          TO_VERSION: ${{ needs.classify.outputs.to_version }}
          IS_FIRST_PARTY: ${{ needs.classify.outputs.is_first_party }}
          UPDATE_TYPE_META: ${{ needs.classify.outputs.update_type }}
          DEP_GROUP: ${{ needs.classify.outputs.dependency_group }}
          PARSE_ERROR: ${{ needs.classify.outputs.parse_error }}
          SC_ERRORS: ${{ needs.supply_chain_check.outputs.check_errors }}
          BC_ERRORS: ${{ needs.breaking_change_check.outputs.check_errors }}
        run: |
          set -euo pipefail
          bash "${GITHUB_WORKSPACE}/actions-tools/scripts/auto-merge-decide.sh"

      - name: Apply decision labels
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DECISION: ${{ steps.decision.outputs.decision }}
          RISK_LEVEL: ${{ steps.decision.outputs.risk_level }}
          BLOCKED_LABELS: ${{ steps.decision.outputs.blocked_labels }}
        with:
          script: |
            const prNumber = context.payload.pull_request.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const decision = process.env.DECISION;
            const riskLevel = process.env.RISK_LEVEL;
            const blockedLabels = process.env.BLOCKED_LABELS.trim().split(/\s+/).filter(Boolean);

            // Remove any existing merge/* labels (authoritative update)
            const mergeLabels = ['merge/eligible', 'merge/approved', 'merge/blocked', 'merge/manual-review', 'merge/skipped'];
            const riskLabels = ['risk/low', 'risk/medium', 'risk/high'];

            const currentLabels = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const currentNames = currentLabels.data.map(l => l.name);

            for (const label of [...mergeLabels, ...riskLabels]) {
              if (currentNames.includes(label)) {
                await github.rest.issues.removeLabel({
                  owner, repo, issue_number: prNumber, name: label,
                }).catch(() => {});
              }
            }

            // Apply new labels
            const newLabels = [`risk/${riskLevel}`];

            if (decision === 'approve') {
              newLabels.push('merge/approved');
            } else if (decision === 'manual') {
              // Fail-closed path: checks errored/partial — needs human eyes,
              // but nothing affirmatively failed.
              newLabels.push('merge/manual-review');
              newLabels.push(...blockedLabels);
            } else {
              newLabels.push('merge/blocked');
              newLabels.push(...blockedLabels);
            }

            await github.rest.issues.addLabels({
              owner, repo,
              issue_number: prNumber,
              labels: newLabels,
            });

      - name: Approve and auto-merge
        if: steps.decision.outputs.decision == 'approve'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGE_METHOD: ${{ inputs.auto_merge_method }}
          DEP_NAME: ${{ needs.classify.outputs.dep_name }}
          TO_VERSION: ${{ needs.classify.outputs.to_version }}
        run: |
          set -euo pipefail

          # Approve the PR using the GitHub App token
          gh pr review "$PR_NUMBER" --approve \
            --body "Auto-approved by Dependabot Auto-Merge: all supply chain and breaking change checks passed for ${DEP_NAME}@${TO_VERSION}." \
            --repo "$GITHUB_REPOSITORY"

          # Enable auto-merge. On repos without required status checks GitHub
          # cannot latch auto-merge on an already-clean PR (the enable silently
          # no-ops or errors) — so verify, and fall back to a direct merge when
          # nothing is pending. Observed 2026-07-03: ~60% of first-party bumps
          # stalled approved-but-unmerged without this fallback.
          gh pr merge "$PR_NUMBER" --auto "--${MERGE_METHOD}" \
            --repo "$GITHUB_REPOSITORY" || echo "auto-merge enable failed — will verify and fall back"

          sleep 5
          PR_STATE=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json state --jq '.state')
          AUTO_ON=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json autoMergeRequest --jq '.autoMergeRequest != null')
          if [ "$PR_STATE" = "OPEN" ] && [ "$AUTO_ON" != "true" ]; then
            # Neither merged nor armed: delegate the green-gate + direct-merge to
            # the shared helper (grade-A #14 adoption) instead of an inline
            # gh-pr-checks|awk gate. Same decision — merge iff the PR is a clean,
            # green, non-draft trusted-author PR — via the canonical
            # scripts/pr-green-merge.sh (statusCheckRollup gate; a transient
            # checks-API error can no longer read as GREEN; a review-blocked PR is
            # skipped cleanly rather than crashing on a rejected merge).
            PR_NUMBER="$PR_NUMBER" REPO="$GITHUB_REPOSITORY" MERGE_METHOD="$MERGE_METHOD" DRY_RUN=false \
              bash "${GITHUB_WORKSPACE}/actions-tools/scripts/pr-green-merge.sh"
          else
            echo "Auto-merge armed (or PR already merged) for PR #${PR_NUMBER}"
          fi

      - name: Add review comment for blocked PRs
        if: steps.decision.outputs.decision != 'approve'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RISK_SUMMARY: ${{ needs.breaking_change_check.outputs.risk_summary }}
          BLOCKED_LABELS: ${{ steps.decision.outputs.blocked_labels }}
          DEP_NAME: ${{ needs.classify.outputs.dep_name }}
          TO_VERSION: ${{ needs.classify.outputs.to_version }}
        with:
          script: |
            const blockedLabels = process.env.BLOCKED_LABELS.trim().split(/\s+/).filter(Boolean);
            const reasons = blockedLabels.map(l => `- \`${l}\``).join('\n');
            const body = [
              `## Auto-Merge Blocked`,
              ``,
              `**${process.env.DEP_NAME}@${process.env.TO_VERSION}** did not pass automated checks.`,
              ``,
              `### Blocking Reasons`,
              reasons,
              ``,
              `### Analysis`,
              process.env.RISK_SUMMARY || '_No analysis available_',
              ``,
              `Please review and merge manually if appropriate.`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });

  # ----------------------------------------------------------------
  # Job 5: Failure notification (standard pattern)
  # ----------------------------------------------------------------
  notify_failure:
    needs: [classify, supply_chain_check, breaking_change_check, decide]
    if: failure() && inputs.slack_channel_id != ''
    uses: ./.github/workflows/org-slack-notify.yml
    with:
      notification-type: 'failure'
      channel-id: ${{ inputs.slack_channel_id }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
