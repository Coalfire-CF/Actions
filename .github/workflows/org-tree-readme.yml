name: Readme Tree (Reusable on PR)

on:
  workflow_call:
    inputs:
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
      commit_message:
        type: string
        default: "chore: update README tree structure"
      exclude_pattern:
        type: string
        default: ".git|node_modules|.github"
      working_directory:
        type: string
        default: "."
    secrets:
      SLACK_BOT_TOKEN:
        description: 'Slack bot token for failure notifications (required if slack_channel_id is set)'
        required: false

permissions:
  contents: write
  pull-requests: write

# Serialize per PR (or per ref for non-PR events). Cancel superseded PR runs, but
# NEVER cancel a non-PR (e.g. push:main) run mid-flight — it may be writing to main.
concurrency:
  group: tree-readme-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  update-readme-on-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head (downstream repo)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
          fetch-depth: 0

      - name: Configure git identity (early)
        env:
          GIT_ACTOR: ${{ github.actor }}
        run: |
          git config user.name "$GIT_ACTOR"
          git config user.email "${GIT_ACTOR}@users.noreply.github.com"

      - name: Install tree
        run: |
          sudo apt-get install -y tree

      - name: Run updater (embedded script)
        id: run
        working-directory: ${{ inputs.working_directory }}
        env:
          EXCLUDE_PATTERN: ${{ inputs.exclude_pattern }}
        run: |
          set +e
          cat >/tmp/update-readme-tree.sh <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail

          # ---- Defaults if config file is missing ----
          DEFAULT_FILES=("README.md")
          DEFAULT_CHAPTER="Tree"
          DEFAULT_INCLUDE=(".")

          # Allow override via env (optional)
          EXCLUDE_PATTERN="${EXCLUDE_PATTERN:-.git|node_modules|.github}"

          # NOTE: resolved relative to the working directory of this step
          CONFIG_PATH=".github/readmetreerc.yml"
          FILES=("${DEFAULT_FILES[@]}")
          CHAPTER="$DEFAULT_CHAPTER"
          INCLUDE=("${DEFAULT_INCLUDE[@]}")

          if [[ -f "$CONFIG_PATH" ]]; then
            # Parse chapter
            cfg_chapter="$(grep -E '^[[:space:]]*chapter[[:space:]]*:' "$CONFIG_PATH" \
              | head -n1 | cut -d: -f2- | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            [[ -n "${cfg_chapter}" ]] && CHAPTER="${cfg_chapter}"

            # Parse fileNames
            if grep -qE '^[[:space:]]*file[Nn]ames[[:space:]]*:' "$CONFIG_PATH"; then
              mapfile -t list_files < <(awk '
                BEGIN{inList=0}
                /^[[:space:]]*file[Nn]ames[[:space:]]*:/ {inList=1; next}
                inList && /^[[:space:]]*-/ {
                  gsub(/^[[:space:]]*-[[:space:]]*/, "", $0);
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0);
                  print $0; next
                }
                inList && !/^[[:space:]]*-/ {inList=0}
              ' "$CONFIG_PATH")
              (( ${#list_files[@]} )) && FILES=("${list_files[@]}")
            fi

            # Parse include
            if grep -qE '^[[:space:]]*include[[:space:]]*:' "$CONFIG_PATH"; then
              mapfile -t list_include < <(awk '
                BEGIN{inList=0}
                /^[[:space:]]*include[[:space:]]*:/ {inList=1; next}
                inList && /^[[:space:]]*-/ {
                  gsub(/^[[:space:]]*-[[:space:]]*/, "", $0);
                  gsub(/^[[:space:]]+|[[:space:]]+$/, "", $0);
                  # #208: strip surrounding quotes so a quoted include (e.g. - "modules")
                  # yields modules, not the literal "modules" (which fails the -e test
                  # and is silently skipped, falling back to repo root).
                  gsub(/^["'\'']|["'\'']$/, "", $0);
                  print $0; next
                }
                inList && !/^[[:space:]]*-/ {inList=0}
              ' "$CONFIG_PATH")
              (( ${#list_include[@]} )) && INCLUDE=("${list_include[@]}")
            fi
          fi

          # Ensure include paths exist
          declare -a EXISTING_INCLUDE=()
          for p in "${INCLUDE[@]}"; do
            [[ -e "$p" ]] && EXISTING_INCLUDE+=("$p") || echo "Skipping missing include: $p"
          done
          (( ${#EXISTING_INCLUDE[@]} == 0 )) && EXISTING_INCLUDE=(".")

          # Build tree
          tree_output="$(tree -I "$EXCLUDE_PATTERN" --noreport --charset ascii "${EXISTING_INCLUDE[@]}" | sed 's/`/|/g')"

          changed=0
          for file_name in "${FILES[@]}"; do
            if [[ ! -f "$file_name" ]]; then
              echo "File $file_name not found, skipping."
              continue
            fi

            # Emit an org-markdown-lint-compliant section: a blank line after the
            # heading (MD022) and around the fenced block (MD031). The trailing
            # blank BEFORE the next heading is added by the awk below (so the
            # last-section case ends with a single newline — MD047 — not a stray
            # blank). Regenerating this section must never re-introduce lint debt.
            final_tree="## ${CHAPTER}

          \`\`\`text
          ${tree_output}
          \`\`\`"

            if grep -q "^## ${CHAPTER}\$" "$file_name"; then
              # Replace existing section
              awk -v chapter="$CHAPTER" -v tree="$final_tree" '
                BEGIN {p=1; found=0}
                $0 ~ "^## "chapter"$" {print tree; p=0; found=1; next}
                $0 ~ /^## / && p==0 {print ""; p=1}
                p==1 {print}
                END {if (found==0) print "\n" tree}
              ' "$file_name" > "$file_name.new"
              mv "$file_name.new" "$file_name"
            else
              # Append if missing
              printf "\n%s\n" "$final_tree" >> "$file_name"
            fi
            changed=1
          done

          # Exit code 10 if updated
          (( changed == 1 )) && exit 10 || exit 0
          BASH

          chmod +x /tmp/update-readme-tree.sh
          /tmp/update-readme-tree.sh
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      # ACTOR-gate the push (issue #149): a Dependabot-actor run gets a READ-ONLY
      # GITHUB_TOKEN and cannot see the App secrets, so the push is structurally
      # impossible and would false-red. We gate on github.actor (token capability),
      # NOT pull_request.user.login — a human pushing to a Dependabot branch gets a
      # WRITE token and SHOULD push. This is a deliberate divergence from the
      # auto-merge login gate, whose job is authorship trust, not token capability.
      - name: Commit & push if changed
        if: ${{ steps.run.outputs.exit_code == '10' && github.actor != 'dependabot[bot]' }}
        env:
          COMMIT_MSG: ${{ inputs.commit_message }}
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push origin HEAD

      # Keep the drift VISIBLE on Dependabot runs (can't push). The read-only token
      # can't post a PR comment, so an annotation + step summary is the only channel.
      - name: Report README-tree drift (Dependabot read-only token)
        if: ${{ steps.run.outputs.exit_code == '10' && github.actor == 'dependabot[bot]' }}
        run: |
          echo "::warning::README tree is out of date on this Dependabot PR and could not be auto-pushed (read-only Dependabot token). A maintainer commit/push — or @dependabot rebase after one — will refresh it."
          {
            echo "### README tree drift (not auto-pushed)"
            echo ""
            echo "This PR runs under the read-only Dependabot token, so the tree README update could not be committed. Push a commit as a maintainer to refresh it (issue #149)."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    needs: update-readme-on-pr
    if: failure() && inputs.slack_channel_id != ''
    uses: ./.github/workflows/org-slack-notify.yml
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
    with:
      notification-type: failure
      channel-id: ${{ inputs.slack_channel_id }}
