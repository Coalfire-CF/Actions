name: 'Terraform-Docs'

on:
  workflow_call:
    inputs:
      slack_channel_id:
        description: 'Slack channel ID for failure notifications (optional)'
        required: false
        type: string
        default: ''
      find-dir:
        required: false
        type: string
        default: 'disabled'
      recursive:
        required: false
        type: boolean
        default: false
      recursive-path:
        required: false
        type: string
        default: 'modules'
      working-dir:
        required: false
        type: string
        default: '.'

jobs:
    docs:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
          with:
            ref: ${{ github.event.pull_request.head.ref }}

        - name: Render terraform docs inside the README.md and push changes back to PR branch
          uses: terraform-docs/gh-actions@6de6da0cefcc6b4b7a5cbea4d79d97060733093c # v1.4.1
          with:
            find-dir: ${{ inputs.find-dir }}
            git-push: "true"
            output-file: README.md
            output-method: inject
            recursive: ${{ inputs.recursive }}
            recursive-path: ${{ inputs.recursive-path }}
            working-dir: ${{ inputs.working-dir }}

    notify-failure:
      needs: docs
      if: failure() && inputs.slack_channel_id != ''
      uses: Coalfire-CF/Actions/.github/workflows/org-slack-notify.yml@main
      secrets:
        SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      with:
        notification-type: failure
        channel-id: ${{ inputs.slack_channel_id }}
