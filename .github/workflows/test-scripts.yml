name: "Test Scripts"

# Runs the repository's script meta-tests (tests/*.test.sh) on every PR that
# touches the gate scripts, their tests/fixtures, or this workflow. These tests
# exercise scripts/source-pin-check.sh and scripts/uses-pin-check.sh against the
# fixtures under tests/fixtures/ and assert PASS/WARN/FAIL + strict behavior.

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-scripts:
    name: Run tests/*.test.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run all script meta-tests
        run: |
          set -euo pipefail
          shopt -s nullglob
          tests=(tests/*.test.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "::error::no tests/*.test.sh found"
            exit 1
          fi
          rc=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            chmod +x "$t"
            if bash "$t"; then
              echo "PASS: ${t}"
            else
              echo "::error file=${t}::meta-test failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "$rc"

  actionlint:
    name: Lint workflows (actionlint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install actionlint (pinned + checksum-verified)
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.12
          ACTIONLINT_SHA256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -sSfL -o /tmp/actionlint.tar.gz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  /tmp/actionlint.tar.gz" | sha256sum -c -
          sudo tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          actionlint --version

      - name: Run actionlint over all workflows
        env:
          # Gate at shellcheck warning+ severity. The style/info nits in the large
          # inline heredocs are deferred to the scripts/*.sh extraction (grade-A plan
          # item #10), which runs full shellcheck over the extracted files.
          SHELLCHECK_OPTS: -S warning
        run: actionlint -color

  no-main-refs:
    name: Guard — no mutable main refs (F36/N2 regression)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert no raw Actions/main fetch and no @main sibling calls
        run: |
          set -uo pipefail
          rc=0
          # F36: no workflow may resolve a value from a mutable Actions/main raw URL.
          if grep -rnE 'raw\.githubusercontent\.com/Coalfire-CF/Actions/main' .github/workflows/; then
            echo "::error::F36 regression — a workflow fetches from Actions/main (use a baked literal / caller .terraform-version)."
            rc=1
          fi
          # N2: no ACTIVE (non-comment) internal sibling call may use @main (use a local ./ ref).
          if grep -rnE '^[[:space:]]*uses: Coalfire-CF/Actions/\.github/workflows/[A-Za-z0-9._-]+\.yml@main' .github/workflows/; then
            echo "::error::N2 regression — an internal sibling call uses @main (use uses: ./.github/workflows/<x>.yml)."
            rc=1
          fi
          # N2 (composite path): no ACTIVE internal composite-action ref may use @main.
          # Reusable workflows check out the CONSUMER repo, so ./ refs don't resolve here — pin @<sha> # vX.Y.Z.
          if grep -rnE '^[[:space:]]*uses: Coalfire-CF/Actions/actions/[^@]+@main' .github/workflows/; then
            echo "::error::N2 regression — an internal composite action ref uses @main (pin to @<release-sha> # vX.Y.Z)."
            rc=1
          fi
          if [ "$rc" -eq 0 ]; then
            echo "OK: no Actions/main raw fetches and no active @main sibling refs."
          fi
          exit "$rc"
