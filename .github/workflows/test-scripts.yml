name: "Test Scripts"

# Runs the repository's script meta-tests (tests/*.test.sh) on every PR that
# touches the gate scripts, their tests/fixtures, or this workflow. These tests
# exercise scripts/source-pin-check.sh and scripts/uses-pin-check.sh against the
# fixtures under tests/fixtures/ and assert PASS/WARN/FAIL + strict behavior.

on:
  pull_request:
    paths:
      - 'scripts/**'
      - 'tests/**'
      - '.github/workflows/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-scripts:
    name: Run tests/*.test.sh
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Run all script meta-tests
        run: |
          set -euo pipefail
          shopt -s nullglob
          tests=(tests/*.test.sh)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "::error::no tests/*.test.sh found"
            exit 1
          fi
          rc=0
          for t in "${tests[@]}"; do
            echo "::group::${t}"
            chmod +x "$t"
            if bash "$t"; then
              echo "PASS: ${t}"
            else
              echo "::error file=${t}::meta-test failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit "$rc"

  no-main-refs:
    name: Guard — no mutable main refs (F36/N2 regression)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert no raw Actions/main fetch and no @main sibling calls
        run: |
          set -uo pipefail
          rc=0
          # F36: no workflow may resolve a value from a mutable Actions/main raw URL.
          if grep -rnE 'raw\.githubusercontent\.com/Coalfire-CF/Actions/main' .github/workflows/; then
            echo "::error::F36 regression — a workflow fetches from Actions/main (use a baked literal / caller .terraform-version)."
            rc=1
          fi
          # N2: no ACTIVE (non-comment) internal sibling call may use @main (use a local ./ ref).
          if grep -rnE '^[[:space:]]*uses: Coalfire-CF/Actions/\.github/workflows/[A-Za-z0-9._-]+\.yml@main' .github/workflows/; then
            echo "::error::N2 regression — an internal sibling call uses @main (use uses: ./.github/workflows/<x>.yml)."
            rc=1
          fi
          if [ "$rc" -eq 0 ]; then
            echo "OK: no Actions/main raw fetches and no active @main sibling refs."
          fi
          exit "$rc"
